<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>
    <div id="layout">
        <div class="left">

        </div>
        <div class="right">
            <nav>
                <button id="mode">
                    <img src="../media/moon.svg" class="moon-icon" height="30px">
                    <img src="../media/sun.svg" class="sun-icon" height="30px">
                </button>

                <button id="add">

                </button>
            </nav>
            <div id="info">

            </div>
            <div id="footer"></div>
        </div>
    </div>
    <dialog id="project-modal">
        <form method="dialog">
            <h3>New Project</h3>

            <input type="text" id="title-input" placeholder="Title" required>
            <textarea id="desc-input" placeholder="Description"></textarea>

            <input type="date" id="date-input">

            <select id="priority-input">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>

            <div class="modal-buttons">
                <button type="button" id="cancel-btn">Cancel</button>
                <button type="submit" id="confirm-btn">Add Project</button>
            </div>
        </form>
    </dialog>
</body>
</html>
